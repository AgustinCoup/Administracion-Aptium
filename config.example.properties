# PLANTILLA DE CONFIGURACIÓN - Copia a config.properties para usar
# ===================================================================
# 
# IMPORTANTE: Este archivo es UNA PLANTILLA. NO commitearlo con datos reales.
# 
# PRIORIDAD DE CONFIGURACIÓN (de mayor a menor):
# 1. Variables de entorno del sistema (DB_HOST, DB_USER, DB_PASS, DB_NAME, DB_PORT)
# 2. Archivo config.properties en /etc/aptium/ (Linux) O C:\Aptium\ (Windows)
# 3. Valores por defecto en código
#
# EN PRODUCCIÓN:
#    - NO usar este archivo
#    - ESTABLCER variables de entorno en el servidor
#    - O crear config.properties en /etc/aptium/config.properties con permisos 600
#
# EN DESARROLLO LOCAL:
#    - Copiar este archivo a 'config.properties' en la raíz del proyecto
#    - O en Administracion-Aptium/config.properties
#    - Modificar valores según tu entorno local


# ===== BASE DE DATOS =====

# Host/IP del servidor MySQL
# EN PROD: IP de servidor MySQL remoto
# EN DEV: localhost
db.ip=localhost

# Puerto MySQL (default 3306)
db.port=3306

# Nombre de la base de datos
db.name=sistema_empresa

# Usuario de base de datos
# EN PROD: usuarioEspecifico (NO root)
# EN DEV: root
db.user=root

# Contraseña de base de datos
# ⚠️  CRÍTICO: Nunca commitearlo en Git con contraseña real
# EN PROD: Contraseña fuerte, establecer vía variable de entorno DB_PASS
# EN DEV: contraseña local (puede ser simple)
db.pass=root
